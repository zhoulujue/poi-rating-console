<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>POI 评分汇总</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace">
        <header class="topbar">
          <div>
            <p class="eyebrow">POI Rating Console</p>
            <h1>多平台评分查询</h1>
          </div>
          <div class="status-stack" aria-label="数据源状态">
            <div class="freshness" id="googleStatus">
              <span class="status-dot"></span>
              正在准备 Google Places
            </div>
            <div class="freshness" id="tripAdvisorStatus">
              <span class="status-dot"></span>
              TripAdvisor 待搜索
            </div>
            <div class="freshness" id="bookingStatus">
              <span class="status-dot"></span>
              Booking 待搜索
            </div>
            <div class="freshness" id="yelpStatus">
              <span class="status-dot"></span>
              Yelp 待搜索
            </div>
            <div class="freshness" id="michelinStatus">
              <span class="status-dot"></span>
              Michelin 数据集待搜索
            </div>
            <div class="freshness" id="geminiStatus">
              <span class="status-dot"></span>
              Gemini Search 待搜索
            </div>
            <div class="freshness" id="braveStatus">
              <span class="status-dot"></span>
              Brave Search 待搜索
            </div>
            <div class="freshness" id="tavilyStatus">
              <span class="status-dot"></span>
              Tavily Search 待搜索
            </div>
          </div>
        </header>

        <section class="content-grid">
          <section class="home-panel" id="homeView" aria-label="POI 发现首页">
            <div class="runtime-notice" id="runtimeNotice" hidden>
              TripAdvisor 和 Booking 需要通过本地代理访问。请运行 node server.js 后打开 http://127.0.0.1:4173。
            </div>

            <form class="home-search-card" id="homeSearchForm">
              <label class="home-search-field">
                <span>Search anything</span>
                <input
                  id="searchInput"
                  type="search"
                  placeholder="Where do you want to go?"
                  autocomplete="off"
                />
              </label>
              <button type="submit" id="homeSearchButton">搜索</button>
              <p>约会、亲子、出差、安全、方便、预算、地铁线附近</p>
            </form>

            <div class="quick-filters scene-pills" aria-label="快捷场景标签">
              <button data-scene="Date Night" data-query="date night restaurants">Date Night</button>
              <button data-scene="Family Fun" data-query="family friendly places">Family Fun</button>
              <button data-scene="Business" data-query="business trip convenient hotel or restaurant">Business</button>
              <button data-scene="Solo" data-query="solo dining or stay">Solo</button>
              <button data-scene="Night Out" data-query="night out restaurants and bars">Night Out</button>
            </div>

            <div class="home-filters" aria-label="位置筛选">
              <div class="type-switch" role="tablist" aria-label="POI 类型">
                <button class="type-tab is-active" data-type="all" role="tab" aria-selected="true">全部</button>
                <button class="type-tab" data-type="restaurant" role="tab" aria-selected="false">餐厅</button>
                <button class="type-tab" data-type="hotel" role="tab" aria-selected="false">酒店</button>
              </div>
              <label>
                <span>City</span>
                <input id="cityFilter" type="text" value="New York" autocomplete="off" />
              </label>
              <label>
                <span>Area</span>
                <input id="districtFilter" type="text" placeholder="Manhattan / SoHo" autocomplete="off" />
              </label>
              <label>
                <span>Transit</span>
                <input id="transitFilter" type="text" placeholder="Line 6 / PATH" autocomplete="off" />
              </label>
              <label>
                <span>Distance</span>
                <select id="distanceFilter">
                  <option value="">Any</option>
                  <option value="5 min walk">5 min walk</option>
                  <option value="10 min walk">10 min walk</option>
                  <option value="15 min transit">15 min transit</option>
                  <option value="30 min transit">30 min transit</option>
                </select>
              </label>
            </div>

            <div class="ai-status" id="aiStatus"></div>
            <div class="intent-bar" id="intentBar" hidden></div>

            <section class="home-section ai-results-section" id="aiResultsSection" hidden>
              <div class="panel-heading">
                <h2>AI Picks</h2>
                <span id="resultCount"></span>
              </div>
              <div id="poiList" class="poi-list"></div>
            </section>

            <section class="home-section">
              <div class="panel-heading">
                <h2>Near You</h2>
                <span id="nearYouCity"></span>
              </div>
              <div class="recommendation-rail" id="nearYouRail"></div>
            </section>

            <section class="home-section">
              <div class="panel-heading">
                <h2>Trending in <span id="trendingCity">New York</span></h2>
              </div>
              <div class="trending-grid" id="trendingGrid"></div>
            </section>
          </section>

          <section class="detail-panel" aria-live="polite">
            <div id="detailView"></div>
          </section>
        </section>
      </section>
    </main>

    <template id="emptyTemplate">
      <div class="empty-state">
        <div class="empty-visual" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
        </div>
        <h2>选择一个 POI 查看详情</h2>
        <p>从首页搜索、推荐卡片或 AI Picks 中选择一个地点后，这里会展示平台评分和 Know Before You Go。</p>
      </div>
    </template>

    <script src="./config.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
